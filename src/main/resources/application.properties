# Gemini Automation Configuration

# Gemini URL
gemini.url=https://gemini.google.com/app

# Text to input (input field is found by aria-label="Enter a prompt for Gemini")
gemini.input.text=Give data in JSON format, check current status of world's situation and India sector regarding stocks and give me stocks that are performing well and good for swing trading. Provide entry price, stop loss, target price, reason to buy, and if not reached target, exit in max how many days. IMPORTANT: Respond ONLY with valid JSON in exactly this structure (no additional text before or after): {"market_status": { "global_sentiment": "string describing global market sentiment", "india_sector_outlook": {"resilient_sectors": ["sector1", "sector2"],"under_pressure": ["sector1", "sector2"]}},"swing_trading_recommendations": [ { "stock_name": "Full company name","ticker": "SYMBOL", "entry_range": "price range as string","stop_loss": "price as string", "target_price": "price as string", "max_exit_days": number (integer, not string), "reason_to_buy": "detailed reasoning" }],"disclaimer": "risk disclaimer message"}

# Send button is found by aria-label="Send message"

# Selenium Configuration
selenium.timeout=30
selenium.headless=false

# Spring Boot Configuration
spring.main.web-application-type=none
